<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CHENGDU · PORTAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #1e2a1f, #0a100c);
            font-family: 'Inter', 'SF Pro Display', 'Poppins', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* floating abstract particles */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(230, 180, 80, 0.15) 1.5px, transparent 1.5px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            animation: driftParticles 20s linear infinite;
        }

        @keyframes driftParticles {
            0% { background-position: 0 0; }
            100% { background-position: 80px 80px; }
        }

        .glow-aura {
            position: absolute;
            width: 70vmax;
            height: 70vmax;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(210, 150, 60, 0.12), rgba(0,0,0,0));
            bottom: -20%;
            right: -20%;
            filter: blur(70px);
            pointer-events: none;
            z-index: 0;
            animation: floatAura 18s infinite alternate;
        }

        @keyframes floatAura {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(-5%, -8%) scale(1.12); opacity: 0.9; }
        }

        /* main card */
        .portal {
            position: relative;
            z-index: 20;
            max-width: 760px;
            width: 88%;
            background: rgba(15, 25, 19, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 88px;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(240, 200, 100, 0.25) inset;
            padding: 2.8rem 2rem 3.8rem;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(245, 205, 110, 0.25);
        }

        .portal:hover {
            transform: translateY(-5px);
            background: rgba(22, 34, 26, 0.78);
            box-shadow: 0 48px 70px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(250, 215, 120, 0.4) inset;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: scale(0.96) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .greeting {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(125deg, #f7e5b5, #ecca7a, #fae2aa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .city-name {
            font-size: 5.4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffe6b3, #e2b45c, #ffda95);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 6px;
            margin-top: -0.2rem;
            margin-bottom: 0.8rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 2.2rem;
            margin: 0.5rem 0 1rem;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
        }

        .icons span {
            display: inline-block;
            animation: bounceLight 2.5s infinite ease;
        }

        .icons span:nth-child(2) { animation-delay: 0.3s; }
        .icons span:nth-child(3) { animation-delay: 0.6s; }

        @keyframes bounceLight {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }

        .badge {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #e9ddb5;
            background: rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            margin-bottom: 1.6rem;
            font-weight: 500;
            border: 0.5px solid rgba(210, 170, 80, 0.6);
        }

        .divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f2cf86, #e7b758, #f2cf86, transparent);
            margin: 0.8rem auto 1.5rem auto;
            border-radius: 4px;
        }

        .message {
            color: #f0ecd6;
            font-size: 1rem;
            max-width: 460px;
            margin: 0 auto 2rem auto;
            line-height: 1.55;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.65rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            font-weight: 400;
        }

        /* enter button - redirects to homepage */
        .enter-button {
            display: inline-block;
            background: linear-gradient(110deg, #f5dc94, #e8bc64);
            border: none;
            padding: 1rem 3rem;
            font-size: 2rem;
            font-weight: 800;
            font-family: inherit;
            color: #131f18;
            border-radius: 90px;
            cursor: pointer;
            transition: 0.22s linear;
            box-shadow: 0 14px 26px rgba(0, 0, 0, 0.45), 0 1px 0 rgba(255, 245, 180, 0.7) inset;
            text-decoration: none;
            letter-spacing: 4px;
            backdrop-filter: blur(4px);
            margin-top: 0.6rem;
        }

        .enter-button:hover {
            transform: scale(1.02) translateY(-4px);
            background: linear-gradient(110deg, #ffe6aa, #f0c870);
            box-shadow: 0 20px 32px rgba(0, 0, 0, 0.55);
            color: #0a130e;
        }

        .enter-button:active {
            transform: scale(0.97);
        }

        .footer-note {
            position: absolute;
            bottom: 18px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: rgba(210, 190, 130, 0.5);
            letter-spacing: 1px;
            z-index: 15;
            pointer-events: none;
            font-family: monospace;
        }

        @media (max-width: 600px) {
            .portal {
                padding: 2rem 1.5rem 3rem;
                border-radius: 64px;
            }
            .greeting {
                font-size: 1.8rem;
                letter-spacing: 3px;
            }
            .city-name {
                font-size: 3rem;
                letter-spacing: 3px;
            }
            .enter-button {
                font-size: 1.5rem;
                padding: 0.7rem 2rem;
                letter-spacing: 3px;
            }
            .icons {
                font-size: 1.6rem;
                gap: 12px;
            }
            .badge {
                font-size: 0.65rem;
                letter-spacing: 3px;
            }
            .message {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="particles"></div>
<div class="glow-aura"></div>

<div class="portal">
    <div class="badge">✦ LAND OF ABUNDANCE ✦</div>
    <div class="greeting">WELCOME TO</div>
    <div class="city-name">CHENGDU</div>
    
    <div class="icons">
        <span>🐼</span>
        <span>🌶️</span>
        <span>🍵</span>
    </div>
    
    <div class="divider"></div>
    
    <div class="message">
        ⌘ SPICY · SLOW · PANDAS · TEA ⌘<br>
        THE HEART OF TIANFU
    </div>
    
    <!-- Redirect to existing website homepage (zhuhongxue1202.github.io) -->
    <a href="02.html"="enter-button" target="_self" rel="noopener noreferrer">
        ⟡ ENTER ⟡
    </a>
    
    <div style="width: 40px; height: 1px; background: rgba(220,180,90,0.3); margin: 2rem auto 0;"></div>
</div>

<div class="footer-note">
    [  chengdu gateway  ·  tap to enter  ]
</div>

<script>
    (function() {
        const btn = document.querySelector('.enter-button');
        if (btn) {
            const target = btn.getAttribute('href');
            if (!target || target === '#') {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.href = 'https://zhuhongxue1202.github.io/';
                });
            }
        }
    })();
</script>
</body>
</html>
